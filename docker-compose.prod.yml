# docker-compose.prod.yml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    image: yourusername/rental-app:latest  # Замените на ваш Docker Hub username
    container_name: rental-app-prod
    restart: unless-stopped
    working_dir: /var/www
    environment:
      - PHP_MEMORY_LIMIT=512M
      - PHP_MAX_EXECUTION_TIME=300
    env_file:
      - .env.prod
    networks:
      - rental-network-prod
    healthcheck:
      test: ["CMD", "php", "artisan", "health:check"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: rental-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/storage/app/public:/var/www/storage/app/public:ro
      - ./src/public/build:/var/www/public/build:ro  # Vite build files
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro  # Для HTTPS сертификатов
    networks:
      - rental-network-prod
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mysql:
    image: mysql:8.0
    container_name: rental-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "127.0.0.1:3307:3306"  # Только локальный доступ
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - rental-network-prod
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb_buffer_pool_size=1G
      --innodb_log_file_size=256M
      --max_connections=200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:alpine
    container_name: rental-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6380:6379"  # Только локальный доступ
    volumes:
      - redis_data_prod:/data
    networks:
      - rental-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Опционально: очередь для отложенных задач
  worker:
    image: yourusername/rental-app:latest
    container_name: rental-worker-prod
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --tries=3 --timeout=90
    env_file:
      - .env.prod
    networks:
      - rental-network-prod
    depends_on:
      - app
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Опционально: scheduler для cron задач
  scheduler:
    image: yourusername/rental-app:latest
    container_name: rental-scheduler-prod
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    env_file:
      - .env.prod
    networks:
      - rental-network-prod
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data_prod:
    driver: local
  redis_data_prod:
    driver: local

networks:
  rental-network-prod:
    driver: bridge