# docker/nginx/nginx.prod.conf
server {
    client_max_body_size 100M;
    listen 80;
    server_name your-domain.com www.your-domain.com;  # Замените на ваш домен

    root /var/www/public;
    index index.php index.html;

    # Сжатие для улучшения производительности
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Логи
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Кэширование статических файлов
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Таймауты
        fastcgi_read_timeout 600;
        fastcgi_connect_timeout 600;
    }

    # Запрещаем доступ к скрытым файлам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Запрещаем доступ к чувствительным директориям
    location ~ ^/(\.env|storage|bootstrap|config|database|tests) {
        deny all;
        return 404;
    }
}