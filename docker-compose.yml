version: '3.8'

services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: rental-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    environment:
      - PHP_MEMORY_LIMIT=256M
    networks:
      - rental-network

  nginx:
    image: nginx:alpine
    container_name: rental-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    networks:
      - rental-network
    depends_on:
      - app
      - mysql

  mysql:
    image: mysql:8.0
    container_name: rental-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rental_db
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: rental_user
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - rental-network

  redis:
    image: redis:alpine
    container_name: rental-redis
    ports:
      - "6380:6379"
    networks:
      - rental-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: rental-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      UPLOAD_LIMIT: 100M
    networks:
      - rental-network

volumes:
  mysql_data:
    driver: local

networks:
  rental-network:
    driver: bridge